name: repin

services:
  postgres:
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "./.docker/data/postgres:/var/lib/postgresql/data"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - "./.docker/data/minio:/data"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set repin http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do sleep 2; done;
      mc mb -p repin/${MINIO_BUCKET} || true;
      mc anonymous set download repin/${MINIO_BUCKET} || true;
      "

  migrate:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/cli", "migrations", "up"]
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATABASE_SCHEMA: "public"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/http"]
    environment:
      HTTP_SERVER_HOST: "0.0.0.0"
      HTTP_SERVER_PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATABASE_SCHEMA: "public"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_PHONE: "${TELEGRAM_PHONE}"
      TELEGRAM_CHANNEL: "${TELEGRAM_CHANNEL}"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: "./front"
      dockerfile: "../.docker/container/web/Dockerfile"
      args:
        VITE_API_BASE_URL: "${PUBLIC_API_URL}"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      API_INTERNAL_URL: "http://api:8080"
      # Public origin for canonical links. Read at runtime, so a domain change
      # needs `docker compose up -d web`, not a rebuild.
      PUBLIC_SITE_URL: "${PUBLIC_SITE_URL:-}"
    volumes:
      # Channel avatar written by sync/bot, served as /favicon/favicon.jpg.
      - "./.docker/data/favicon:/app/dist/client/favicon:ro"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  # Watches the channel via a bot account (must be a channel admin):
  # imports new/edited posts, removes deleted ones, refreshes channel info.
  # Opt-in (needs TELEGRAM_BOT_TOKEN): `make bot` / `docker compose --profile bot up -d`.
  bot:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/bot"]
    profiles: ["bot"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATABASE_SCHEMA: "public"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_PHONE: "${TELEGRAM_PHONE}"
      TELEGRAM_CHANNEL: "${TELEGRAM_CHANNEL}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHANNEL_REFRESH_INTERVAL: "${TELEGRAM_CHANNEL_REFRESH_INTERVAL:-6h}"
      PROXY_URL: "${PROXY_URL:-}"
      FAVICON_DIR: "/app/var/favicon"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
      - "./.docker/data/favicon:/app/var/favicon"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Drains the job queue: downloads post media and generates SEO metadata.
  # Needs a Telegram session — either TELEGRAM_BOT_TOKEN (preferred: it logs in
  # unattended) or a user session left behind by a completed `make sync`.
  # Without one it restarts until a session appears.
  worker:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/worker"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATABASE_SCHEMA: "public"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_PHONE: "${TELEGRAM_PHONE}"
      TELEGRAM_CHANNEL: "${TELEGRAM_CHANNEL}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      PROXY_URL: "${PROXY_URL:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}"
      OPENROUTER_FALLBACK_MODEL: "${OPENROUTER_FALLBACK_MODEL:-openai/gpt-4o-mini}"
      # Sent as the HTTP-Referer header so OpenRouter can attribute the traffic.
      OPENROUTER_REFERER: "${PUBLIC_SITE_URL:-}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Run on demand: `docker compose run --rm sync` (interactive Telegram login).
  sync:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/sync"]
    profiles: ["tools"]
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATABASE_SCHEMA: "public"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_PHONE: "${TELEGRAM_PHONE}"
      TELEGRAM_CHANNEL: "${TELEGRAM_CHANNEL}"
      PROXY_URL: "${PROXY_URL:-}"
      FAVICON_DIR: "/app/var/favicon"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
      - "./.docker/data/favicon:/app/var/favicon"
    depends_on:
      postgres:
        condition: service_healthy
