name: repin

services:
  postgres:
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "./.docker/data/postgres:/var/lib/postgresql/data"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - "./.docker/data/minio:/data"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set repin http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do sleep 2; done;
      mc mb -p repin/${MINIO_BUCKET} || true;
      mc anonymous set download repin/${MINIO_BUCKET} || true;
      "

  migrate:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/cli", "migrations", "up"]
    # cmd/cli loads bootstrap.CLIConfig — migrations need the database and
    # nothing else, so no env_file and no credentials it would never use.
    environment:
      DATABASE_URL: "${DATABASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/http"]
    # cmd/http loads bootstrap.APIConfig: Postgres plus storage, since media is
    # streamed through /api/v1/media instead of being exposed directly. Still no
    # Telegram or OpenRouter credentials — this is the one service facing the
    # internet. Host and port fall back to 0.0.0.0:8080 from the config defaults.
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "${MINIO_BUCKET}"
      # Origin used to build absolute media links.
      PUBLIC_API_URL: "${PUBLIC_API_URL:-}"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: "./front"
      dockerfile: "../.docker/container/web/Dockerfile"
      args:
        VITE_API_BASE_URL: "${PUBLIC_API_URL}"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      API_INTERNAL_URL: "http://api:8080"
      PUBLIC_SITE_URL: "${PUBLIC_SITE_URL:-}"
    volumes:
      - "./.docker/data/favicon:/app/dist/client/favicon:ro"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  bot:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/bot"]
    profiles: ["bot"]
    restart: unless-stopped
    env_file: ".env"
    environment:
      # Container path, paired with the mount below.
      FAVICON_DIR: "/app/var/favicon"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
      - "./.docker/data/favicon:/app/var/favicon"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/worker"]
    restart: unless-stopped
    env_file: ".env"
    environment:
      # Sent as the HTTP-Referer header so OpenRouter can attribute the traffic.
      OPENROUTER_REFERER: "${PUBLIC_SITE_URL:-}"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  sync:
    build:
      context: "./api"
      dockerfile: "../.docker/container/api/Dockerfile"
    command: ["./bin/sync"]
    profiles: ["tools"]
    stdin_open: true
    tty: true
    env_file: ".env"
    environment:
      # Container path, paired with the mount below.
      FAVICON_DIR: "/app/var/favicon"
    volumes:
      - "./.docker/data/telegram:/app/var/telegram"
      - "./.docker/data/favicon:/app/var/favicon"
    depends_on:
      postgres:
        condition: service_healthy
