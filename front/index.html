<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/favicon/favicon.jpg" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.35s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-loader__spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(2, 23, 38, 0.15);
        border-top-color: #021726;
        animation: app-loader-spin 0.7s linear infinite;
      }
      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loader__spinner {
          animation-duration: 1.4s;
        }
      }
    </style>
    <noscript>
      <style>
        #app-loader {
          display: none !important;
        }
      </style>
    </noscript>
    <!--app-analytics-->
    <!--app-head-->
  </head>
  <body>
    <!--app-analytics-noscript-->
    <div id="app"><!--app-html--></div>
    <div id="app-loader"><span class="app-loader__spinner" role="status" aria-label="Загрузка"></span></div>
    <!--app-state-->
    <script type="module" src="/src/entry-client.ts"></script>
  </body>
</html>
